name: Daily Job Check

on:
  schedule:
    - cron: '0 9 * * *'  # Runs daily at 9 AM UTC (2:30 PM IST)
  workflow_dispatch:     # Also allows manual trigger from GitHub

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run job checker
        run: python automation.py
      
      - name: Upload report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: job-report
          path: index.html
          retention-days: 30
      
      - name: Commit and push results
        run: |
          git config user.name "Job Checker Bot"
          git config user.email "noreply@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily job check - $(date +'%Y-%m-%d %H:%M:%S')" && git push)
        continue-on-error: true
